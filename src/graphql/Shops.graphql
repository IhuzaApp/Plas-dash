query GetShops {
  Shops {
    id
    name
    description
    category_id
    image
    logo
    address
    latitude
    longitude
    operating_hours
    created_at
    updated_at
    relatedTo
    is_active
    phone
    Orders {
      OrderID
      combined_order_id
      created_at
      delivery_address_id
      delivery_fee
      delivery_notes
      delivery_photo_url
      delivery_time
      discount
      found
      id
      service_fee
      shop_id
      shopper_id
      status
      total
      updated_at
      user_id
      voucher_code
      userByUserId {
        created_at
        email
        gender
        is_active
        name
        password_hash
        phone
        profile_picture
      }
      Wallet_Transactions {
        amount
        created_at
        description
        id
        related_order_id
        related_reel_orderId
        status
        type
        wallet_id
      }
