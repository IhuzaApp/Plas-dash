query GetShops {
  Shops {
    id
    name
    description
    category_id
    image
    logo
    address
    latitude
    longitude
    operating_hours
    created_at
    updated_at
    is_active
    phone
    Orders {
      OrderID
      combined_order_id
      created_at
      delivery_address_id
      delivery_fee
      delivery_notes
      delivery_photo_url
      delivery_time
      discount
      found
      id
      service_fee
      shop_id
      shopper_id
      status
      total
      updated_at
      user_id
      voucher_code
      userByUserId {
        created_at
        email
        gender
        is_active
        name
        password_hash
        phone
        profile_picture
      }
      Wallet_Transactions {
        amount
        created_at
        description
        id
        related_order_id
        related_reel_orderId
        status
        type
        wallet_id
      }
      Ratings {
        id
        order_id
        packaging_quality
        professionalism
        rating
        reel_order_id
        review
        reviewed_at
        shopper_id
        updated_at
      }
      Address {
        city
        created_at
        id
        is_default
        latitude
        longitude
        postal_code
        street
        updated_at
        user_id
      }
      Order_Items {
        created_at
        id
        order_id
        price
        product_id
        quantity
        Product {
          barcode
          category
          created_at
          description
          id
          image
          is_active
          measurement_unit
          name
          price
          quantity
          reorder_point
          shop_id
          sku
          supplier
          updated_at
        }
        Order {
          combined_order_id
          created_at
          delivery_address_id
          delivery_fee
          delivery_notes
          delivery_photo_url
          delivery_time
          discount
          found
          id
          service_fee
          shop_id
          shopper_id
          status
          total
          updated_at
          user_id
          voucher_code
        }
      }
    }
  }
}
