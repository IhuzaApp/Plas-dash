query GetProducts {
  Products {
    barcode
    category
    created_at
    id
    image
    is_active
    measurement_unit
    name
    price
    quantity
    reorder_point
    shop_id
    sku
    supplier
    updated_at
    Shop {
      address
      category_id
      created_at
      description
      id
      image
      is_active
      latitude
      longitude
      name
      operating_hours
      updated_at
    }
    Order_Items {
      quantity
      product_id
      price
      order_id
      id
      created_at
    }
    Cart_Items {
      updated_at
      quantity
      product_id
      price
      id
      created_at
      cart_id
    }
  }
}
