query getShopperInformation {
  shoppers {
    Employment_id
    address
    background_check_completed
    created_at
    driving_license
    full_name
    id
    national_id
    onboarding_step
    phone_number
    profile_photo
    status
    transport_mode
    updated_at
    user_id
    active
    phone
    needCollection
    national_id_photo_front
    national_id_photo_back
    mutual_status
    longitude
    mutual_StatusCertificate
    latitude
    proofOfResidency
    signature
    telegram_id
    drivingLicense_Image
    collection_comment
    guarantor
    guarantorPhone
    guarantorRelationship
    Police_Clearance_Cert
  }
}

query GetShoppersByUser_id($user_id: uuid = "") {
  shoppers(where: { user_id: { _eq: $user_id } }) {
    Employment_id
    address
    background_check_completed
    created_at
    driving_license
    full_name
    id
    onboarding_step
    phone_number
    status
    transport_mode
    updated_at
    user_id
    active
    User {
      id
      email
      is_active
      created_at
      gender
      name
      password_hash
      phone
      profile_picture
      updated_at
      role
      Ratings {
        created_at
        customer_id
        delivery_experience
        id
        order_id
        packaging_quality
        professionalism
        rating
        reel_order_id
        review
        reviewed_at
        shopper_id
        updated_at
        businessProduct_id
      }
      tickets {
        created_on
        id
        other_user_id
        priority
        status
        subject
        ticket_num
        update_on
        user_id
        category
      }
      Invoices {
        Proof
        created_at
        customer_id
        delivery_fee
        discount
        id
        invoice_items
        invoice_number
        order_id
        reel_order_id
        service_fee
        status
        subtotal
        tax
        total_amount
      }
      Delivery_Issues {
        created_at
        description
        id
        issue_type
        order_id
        priority
        shopper_id
        status
        updated_at
      }
      Payment_Methods {
        CCV
        create_at
        id
        is_default
        method
        names
        number
        update_on
        user_id
        validity
      }
      Wallets {
        available_balance
        id
        last_updated
        reserved_balance
        shopper_id
      }
    }
    telegram_id
    Revenues {
      amount
      commission_percentage
      created_at
      id
      order_id
      products
      shop_id
      shopper_id
      type
      Plasbusiness_id
      businessOrder_Id
      reel_order_id
      restaurant_id
      restaurant_order_id
    }
    Police_Clearance_Cert
    collection_comment
    drivingLicense_Image
    guarantor
    guarantorPhone
    guarantorRelationship
    latitude
    longitude
    mutual_StatusCertificate
    mutual_status
    national_id
    national_id_photo_back
    national_id_photo_front
    needCollection
    phone
    profile_photo
    proofOfResidency
    signature
  }
}
