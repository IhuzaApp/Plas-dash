query getProductsNames {
  productNames {
    barcode
    create_at
    description
    id
    image
    name
    sku
  }
}

mutation addProductName(
  $barcode: String = ""
  $description: String = ""
  $image: String = ""
  $name: String = ""
  $sku: String = ""
) {
  insert_productNames(
    objects: { barcode: $barcode, description: $description, image: $image, name: $name, sku: $sku }
  ) {
    affected_rows
  }
}
